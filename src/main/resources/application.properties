spring.application.name=tasks
server.port=8080

app.calendar.feed-base-url=https://task.acosci.de

# Actuator / Health
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Konfiguration des Standard-Admins der Task Cards App
app.initial-data.enabled=true
app.admin.email=${APP_ADMIN_EMAIL}
app.admin.password=${APP_ADMIN_PASSWORD}

# Datenquelle
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA / Hibernate
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate
#spring.jpa.hibernate.ddl-auto=update

# Liquibase
spring.liquibase.change-log=db/mariadb/changelog-master.xml

# Logging
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type=INFO

# JWT
security.jwt.secret-key=${SECURITY_JWT_SECRET_KEY}
security.jwt.expiration-time=${SECURITY_JWT_EXPIRATION_TIME:3600000}
security.jwt.refresh-expiration-time=${SECURITY_JWT_REFRESH_EXPIRATION_TIME:604800000}

# OpenAPI / Swagger UI
springdoc.api-docs.path=/api/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.doc-expansion=none

# Backup
app.backups.storage-path=${BACKUP_STORAGE_PATH:/opt/backups/task}
app.backups.runner-url=${BACKUP_RUNNER_URL:http://task-backup-runner:8081/api/v1/backup/run}
app.backups.runner-token=${BACKUP_RUNNER_TOKEN:7FC063D2D9D0E289D022738251FB995617D398556E47429BD221806F457E8273}

# --- SMTP / Mail ---
spring.mail.host=${MAIL_HOST:smtp.example.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SSL_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS_ENABLE:false}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# --- Poll Mail ---
app.poll.public-base-url=${POLL_PUBLIC_BASE_URL:http://localhost:5173}
app.poll.mail.from=${POLL_MAIL_FROM:}
app.poll.mail.from-name=${POLL_MAIL_FROM_NAME:ACoSci Tasks}
app.poll.mail.reply-to=${POLL_MAIL_REPLY_TO:}

