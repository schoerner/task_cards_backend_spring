spring.application.name=tasks
server.port=8088

# DATASOURCE
spring.datasource.url=jdbc:mariadb://localhost:3306/tasks
spring.datasource.username=schueler
spring.datasource.password=Geheim01
# JPA passt SQL-Dialekte entsprechend des Treibers/DBMS an
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Konsolenausgabe der SQL-Befehle
spring.jpa.show-sql=true

# Liquibase
#spring.liquibase.change-log=classpath:db/mariadb/changelog-master.xml
# folgendes zuletzt verwendet
spring.liquibase.change-log=db/mariadb/changelog-master.xml

# Hibernate

# The SQL dialect makes Hibernate generate better SQL for the chosen database
# deprecated: spring.jpa.properties.hibernate.dialect= org.hibernate.dialect.MySQLDialect

# Hibernate ddl auto (create, create-drop, validate, update)
spring.jpa.hibernate.ddl-auto=update
#none for liquibase
#update

logging.level.org.hibernate.SQL=DEBUG
loggin.level.org.hibernate.type=TRACE

